<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味在线打地鼠游戏</title>
    <style>
        /* 基础页面样式 */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        /* 游戏标题和控制面板 */
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #34495e;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-start {
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background-color: #ff8b94;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .btn-start:hover {
            background-color: #ff7680;
            transform: translateY(-2px);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        /* 3x3 游戏棋盘 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 400px;
            padding: 10px;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" width="40" height="40" viewBox="0 0 40 40"><text y="30" font-size="30">🔨</text></svg>') 5 25, pointer; /* 默认未点击时的锤子图标 */
        }

        /* 鼠标点击时的锤子砸击动画 */
        .game-grid:active {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" width="40" height="40" viewBox="0 0 40 40"><g transform="rotate(-30 20 20)"><text y="30" font-size="30">🔨</text></g></svg>') 5 25, pointer;
        }

        /* 地洞容器 */
        .hole {
            position: relative;
            width: 110px;
            height: 110px;
            background: #795548; /* 土地颜色 */
            border-radius: 50%;
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.4), 0 4px 6px rgba(0,0,0,0.2);
            overflow: hidden; /* 保证地鼠从边缘隐藏出来 */
            margin: 0 auto;
        }

        /* 地洞边缘装饰草堆 */
        .hole::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background: #81c784;
            border-radius: 50% 50% 0 0;
            z-index: 3;
            pointer-events: none;
        }

        /* 纯 CSS 绘制的可爱地鼠 */
        .mole {
            position: absolute;
            bottom: -100px; /* 初始隐藏在洞底 */
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 85px;
            background: #a1887f; /* 地鼠皮肤颜色 */
            border-radius: 40px 40px 10px 10px;
            transition: bottom 0.15s ease-out; /* 弹起动画 */
            z-index: 2;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* 地鼠脸部细节 */
        /* 眼睛 */
        .mole::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 20px;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            box-shadow: 27px 0 0 #000; /* 右眼 */
        }

        /* 鼻子 */
        .mole-nose {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 8px;
            background: #ff8a80;
            border-radius: 50%;
        }

        /* 地鼠探出头状态的类 */
        .mole.up {
            bottom: 15px;
        }

        /* 被砸中时的晕厥状态类 */
        .mole.bonked {
            background: #d7ccc8;
        }
        .mole.bonked::before {
            content: 'X';
            font-size: 12px;
            font-weight: bold;
            color: #ff3d00;
            background: none;
            box-shadow: none;
            left: 18px;
            top: 18px;
        }
    </style>
</head>
<body>

    <h1>在线打地鼠</h1>
    
    <!-- 状态看板 -->
    <div class="dashboard">
        <div>得分: <span id="score">0</span></div>
        <div>剩余时间: <span id="time-left">30</span>秒</div>
    </div>

    <!-- 控制按钮 -->
    <button class="btn-start" onclick="startGame()">开始游戏</button>

    <!-- 3x3 核心游戏网格 -->
    <div class="game-grid">
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
        <div class="hole"><div class="mole"><div class="mole-nose"></div></div></div>
    </div>

    <script>
        // 抓取 DOM 节点
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const scoreDisplay = document.getElementById('score');
        const timeLeftDisplay = document.getElementById('time-left');
        const startButton = document.querySelector('.btn-start');

        let score = 0;
        let timeLeft = 30;
        let lastHole;
        let gameActive = false;
        let moleTimer;
        let countdownTimer;

        // 生成随机地鼠冒出时间 (0.4秒 - 1秒之间)
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        // 随机选择一个不重复的洞口
        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        // 控制单个地鼠冒出与收回逻辑
        function peep() {
            if (!gameActive) return;

            const time = randomTime(400, 1000);
            const hole = randomHole(holes);
            const mole = hole.querySelector('.mole');

            // 初始化地鼠状态
            mole.classList.remove('bonked');
            mole.classList.add('up');

            // 设定在规定时间后收回地鼠
            moleTimer = setTimeout(() => {
                mole.classList.remove('up');
                if (gameActive) peep(); // 游戏继续时，下一个地鼠继续冒出
            }, time);
        }

        // 开始游戏主函数
        function startGame() {
            if (gameActive) return; // 防止重复点击重复触发

            // 重置基础数据
            score = 0;
            timeLeft = 30;
            gameActive = true;
            scoreDisplay.textContent = score;
            timeLeftDisplay.textContent = timeLeft;
            startButton.disabled = true;
            startButton.style.opacity = 0.6;
            startButton.textContent = "游玩中...";

            // 激活倒计时机制
            countdown();
            // 激活地鼠冒出
            peep();
        }

        // 倒计时核心时钟
        function countdown() {
            countdownTimer = setInterval(() => {
                timeLeft--;
                timeLeftDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    clearTimeout(moleTimer);
                    gameActive = false;
                    
                    // 游戏结束重置界面
                    moles.forEach(mole => mole.classList.remove('up'));
                    startButton.disabled = false;
                    startButton.style.opacity = 1;
                    startButton.textContent = "重新开始";
                    
                    // 延时提示游戏结果
                    setTimeout(() => {
                        alert(`游戏结束！你的最终得分是：${score} 分！`);
                    }, 200);
                }
            }, 1000);
        }

        // 打中地鼠的点击事件处理
        function whack(e) {
            // 确保是真实的鼠标/手指点击，而非脚本作弊
            if(!e.isTrusted) return; 
            
            const mole = this;
            
            // 确保只有探出头且未被击中的地鼠才算分
            if (mole.classList.contains('up') && !mole.classList.contains('bonked')) {
                score++;
                mole.classList.add('bonked'); // 变成击中受击皮肤
                
                // 击中后迅速收回
                setTimeout(() => {
                    mole.classList.remove('up');
                }, 200);
                
                scoreDisplay.textContent = score;
            }
        }

        // 绑定点击事件到所有的地鼠身上
        moles.forEach(mole => mole.addEventListener('click', whack));
    </script>
</body>
</html>
